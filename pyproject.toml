[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pip-agent"
version = "0.1.0"
description = "Personal assistant agent with persistent memory and configurable persona"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.49,<1",
    "pydantic-settings>=2.8,<3",
    "pyreadline3>=3.5,<4; sys_platform == 'win32'",
    "tavily-python>=0.5",
    "ddgs>=7",
    "pyyaml>=6,<7",
]

[project.optional-dependencies]
wechat = ["httpx>=0.27"]
wecom = ["wecom-aibot-python-sdk>=1.0"]
channels = ["httpx>=0.27", "wecom-aibot-python-sdk>=1.0"]

[project.urls]
Repository = "https://github.com/ByeDream/Pip-Boy"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"pip_agent.skills" = ["**/*.md"]
"pip_agent.scaffold" = ["*.md", "*.json", "*.txt"]
