# Second built-in Pip-Boy theme: amber-on-black retro terminal
# palette, steered away from Fallout iconography toward a
# "Hitchhiker's Guide to the Galaxy" retro-sci-fi vibe (DON'T PANIC /
# 42 / towel). Same locked widget topology as ``wasteland`` (themes
# don't own layout) — only palette + TCSS surfaces + ASCII resources
# differ. See ``docs/themes.md`` for the manifest schema reference.

[theme]
name = "vault-amber"
display_name = "Vault Amber"
version = "0.2.0"
author = "Pip-Boy"
description = "Amber-on-black retro terminal, HHGTTG flavour (DON'T PANIC / 42)."
show_art = true
show_app_log = true
show_status_bar = true
footer_template = "<{tools} tools · {turns} turns · {elapsed_s}s · ${cost}{effort}>"

[palette]
background = "#1a0e00"
foreground = "#ffb000"
accent = "#ffb000"
accent_dim = "#7a5400"
user_input = "#ffd97f"
agent_text = "#ffb000"
thinking = "#a07000"
tool_call = "#ffe27a"
log_info = "#ffb000"
log_warning = "#ffd34d"
log_error = "#ff6b3d"
status_bar = "#3a2200"
status_bar_text = "#ffd97f"
